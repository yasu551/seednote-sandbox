name: Seednote
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  Seednote:
    type: application
    platform: iOS
    sources:
      - path: Seednote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.Seednote
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    info:
      path: Seednote/Resources/Info.plist
      properties:
        CFBundleName: Seednote
        CFBundleDisplayName: Seednote
        CFBundleIdentifier: com.example.Seednote
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

  SeednoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SeednoteTests
    dependencies:
      - target: Seednote
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SeednoteTests:
    build:
      targets:
        Seednote: all
        SeednoteTests: [test]
    test:
      targets:
        - name: SeednoteTests
